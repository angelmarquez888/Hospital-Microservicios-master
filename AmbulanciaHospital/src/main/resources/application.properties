# 1. IDENTIFICACIÓN ESTRICTA
spring.application.name=AmbulanciaHospital
eureka.instance.appname=AmbulanciaHospital

# 2. PUERTO Y BASE DE DATOS
server.port=8082
spring.datasource.url=jdbc:mysql://localhost:3307/hospital_ambulancia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. HIBERNATE
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# 4. CONEXIÓN AL JEFE
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true