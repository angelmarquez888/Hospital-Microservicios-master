server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:

        - id: ambulancias-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/ambulancias/**

        - id: alertas-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/alertas/**

        - id: box-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/box/**

        - id: examen-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/examen/**

        - id: expediente-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/expediente/**

        - id: hora-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/hora/**

        - id: medicamento-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/medicamento/**

        - id: paciente-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/paciente/**

        - id: receta-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/receta/**

        - id: turno-service
          uri: http:/localhost:8090
          predicates:
            - Path=/api/turno/**
